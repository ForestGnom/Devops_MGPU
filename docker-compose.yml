networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local

services:
  db:
    image: postgres:16-alpine
    container_name: healthcare_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  loader:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: healthcare_loader
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/data:ro
    networks:
      - backend-network
    command: python loader.py
    restart: "no"

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      loader:
        condition: service_completed_successfully
    volumes:
      - ./data:/data:ro
    networks:
      - backend-network
    deploy:
      mode: replicated
      replicas: 2
    command: streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0

  nginx:
    image: nginx:alpine
    container_name: healthcare_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - backend-network
